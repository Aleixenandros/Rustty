name: Build Rustty

on:
  push:
    tags:
      - "v*"          # Lanzar al hacer: git tag v0.1.0 && git push --tags
  workflow_dispatch:  # También se puede lanzar manualmente desde GitHub

permissions:
  contents: write     # Necesario para que tauri-action pueda crear el release

jobs:
  # ── Gate de publicación ───────────────────────────────────────
  # Corre ANTES que `build` (que es quien recibe los secretos de firma) y con
  # `permissions: contents: read`. Si algo aquí falla, no se compila, no se firma
  # y no se publica nada: los secretos ni se exponen.
  #
  # Comprueba dos cosas distintas:
  #   1. La misma batería que el CI de PRs (lint, typecheck, tests, contraste,
  #      i18n, build, cargo check/test y clippy bloqueante). Un tag puede
  #      apuntar a un commit que nunca pasó por CI —o a uno de otra rama—, así
  #      que no basta con que el CI de `main` estuviera verde.
  #   2. Coherencia del tag: la versión del tag debe coincidir con la de
  #      `package.json` y `Cargo.toml`, y el CHANGELOG debe tener su sección.
  verify:
    runs-on: ubuntu-latest
    name: Verify release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: Install JS dependencies
        run: npm ci

      # El tag manda: si no cuadra con package.json / Cargo.toml / CHANGELOG,
      # el release se aborta antes de tocar un solo secreto.
      - name: Coherencia del tag con la versión y el changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | cut -d'"' -f2)

          echo "tag=$TAG  package.json=$PKG  Cargo.toml=$CARGO"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::El tag v$TAG no coincide con package.json ($PKG)."
            exit 1
          fi
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::El tag v$TAG no coincide con Cargo.toml ($CARGO). Ejecuta 'npm run sync-version'."
            exit 1
          fi
          if ! grep -q "^## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md no tiene una sección '## [$TAG]'."
            exit 1
          fi

      - name: Coherencia de versión propagada
        run: npm run check:version

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test

      - name: Contraste WCAG de temas (estricto)
        run: npm run check:contrast:ci

      - name: i18n sin texto hardcodeado (estricto)
        run: npm run check:i18n:ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked

      - name: cargo clippy (bloqueante)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target:   x86_64-unknown-linux-gnu
            label:    Linux
          - platform: windows-latest
            target:   x86_64-pc-windows-msvc
            label:    Windows
          - platform: macos-latest
            target:   aarch64-apple-darwin
            label:    macOS (Apple Silicon)

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v7

      # ── Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # ── Rust ──────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Dependencias del sistema (solo Linux) ─────────────────
      # `rpm` para el bundle .rpm; `zstd` para el bundle .pkg.tar.zst (Arch).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config \
            rpm \
            zstd

      # ── Dependencias del sistema (solo macOS) ─────────────────
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          missing=()
          for formula in openssl@3 pkgconf; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing+=("$formula")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          else
            echo "macOS dependencies already installed."
          fi

      # ── Dependencias JS ───────────────────────────────────────
      - name: Install JS dependencies
        run: npm ci

      # ── Build Tauri ───────────────────────────────────────────
      # Los secretos de firma macOS (APPLE_*) se pasan siempre: si no están
      # definidos en el repo, las env vars quedan vacías y tauri-action
      # compila sin firmar, igual que antes. Solo tienen efecto en macOS.
      - name: Build
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          RUSTTY_GOOGLE_DRIVE_CLIENT_ID:     ${{ secrets.RUSTTY_GOOGLE_DRIVE_CLIENT_ID }}
          RUSTTY_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.RUSTTY_GOOGLE_DRIVE_CLIENT_SECRET }}
          # Firma del updater de Tauri. Sin estos secretos, `createUpdaterArtifacts`
          # hace fallar el build, así que deben existir antes de etiquetar un release.
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Solo publicar release cuando el disparador es un tag `v*`. En un
          # `workflow_dispatch` desde `main`, `github.ref_name` sería «main» y
          # crearía un release «Rustty main»; con tagName vacío tauri-action se
          # limita a compilar (smoke test) sin tocar releases.
          tagName:       ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName:   ${{ startsWith(github.ref, 'refs/tags/') && format('Rustty {0}', github.ref_name) || '' }}
          releaseBody:   "Ver CHANGELOG para detalles."
          releaseDraft:  true
          prerelease:    false
          args:          --target ${{ matrix.target }}

      # ── Extras de Linux: empaquetar .pkg.tar.zst para Arch ────
      # Tauri no tiene target pacman; reusamos el .deb (mismo árbol)
      # extrayéndolo y empaquetándolo de nuevo como paquete Arch.
      - name: Build Arch Linux package (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Ruta absoluta — luego hacemos `cd $WORK/root` y la relativa dejaría
          # de resolver al escribir el .pkg.tar.zst.
          BUNDLE_DIR="$(realpath src-tauri/target/${{ matrix.target }}/release/bundle)"
          DEB=$(ls "$BUNDLE_DIR/deb"/*.deb | head -n1)
          WORK=$(mktemp -d)

          # Desempaqueta el .deb (rootfs) en $WORK/root
          mkdir -p "$WORK/root"
          dpkg-deb -x "$DEB" "$WORK/root"
          cd "$WORK/root"

          INSTALLED_SIZE=$(du -sb . | cut -f1)
          BUILDDATE=$(date +%s)

          # Metadatos del paquete pacman
          cat > .PKGINFO <<EOF
          pkgname = rustty
          pkgver = ${VERSION}-1
          pkgdesc = Cliente SSH/SFTP/RDP multiplataforma escrito en Rust
          url = https://rustty.es
          builddate = ${BUILDDATE}
          packager = Alejandro Soriano <noreply@rustty.es>
          size = ${INSTALLED_SIZE}
          arch = x86_64
          license = Apache
          depend = webkit2gtk-4.1
          depend = libayatana-appindicator
          EOF

          # Construye .pkg.tar.zst con bsdtar (que respeta el orden de pacman)
          OUT="$BUNDLE_DIR/Rustty-${VERSION}-1-x86_64.pkg.tar.zst"
          # Lista de ficheros a incluir (PKGINFO primero por convención)
          FILES=$(find . -type f -o -type l | sed 's|^\./||' | sort | sed '/^\.PKGINFO$/d')
          tar --zstd -cf "$OUT" .PKGINFO $FILES

          ls -la "$OUT"
          # `gh` necesita contexto de repo; tras empaquetar seguimos dentro
          # del rootfs temporal del .deb, que no contiene .git.
          cd "$GITHUB_WORKSPACE"
          gh release upload "${{ github.ref_name }}" "$OUT" --clobber --repo "$GITHUB_REPOSITORY"

      # ── Extras de Linux: paquete Flatpak ──────────────────────
      # Versión mínima: usa el binario y assets ya compilados por tauri-action,
      # no recompila Rust dentro del sandbox. No es Flathub-ready (sin lockfiles
      # de cargo/npm) — el objetivo aquí es ofrecer un .flatpak instalable.
      # Cuando se cree la cuenta de Flathub migraremos a un manifest con
      # flatpak-cargo-generator / flatpak-node-generator.
      - name: Build Flatpak (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          FP_DIR="packaging/flatpak"
          BIN="src-tauri/target/${{ matrix.target }}/release/rustty"
          ICON="src-tauri/icons/icon.png"

          # Instalar flatpak + flatpak-builder y añadir el remote flathub
          # (para descargar runtime/sdk org.freedesktop.Platform 24.08).
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

          # Copiar binario + icono al directorio del manifest. Flatpak-builder
          # rechaza rutas fuera del directorio del manifest cuando
          # `--disable-cache` no se usa, así que centralizamos aquí.
          cp "$BIN"  "$FP_DIR/rustty"
          cp "$ICON" "$FP_DIR/icon-512.png"
          chmod +x "$FP_DIR/rustty"

          # Compilar el repo OSTree y exportar el bundle final.
          BUILD_DIR="$(mktemp -d)/build"
          REPO_DIR="$(mktemp -d)/repo"
          OUT="src-tauri/target/${{ matrix.target }}/release/bundle/Rustty-${VERSION}-x86_64.flatpak"
          mkdir -p "$(dirname "$OUT")"

          flatpak-builder \
            --force-clean \
            --repo="$REPO_DIR" \
            --default-branch=stable \
            "$BUILD_DIR" \
            "$FP_DIR/es.rustty.Rustty.yml"

          flatpak build-bundle "$REPO_DIR" "$OUT" es.rustty.Rustty stable

          ls -la "$OUT"
          gh release upload "${{ github.ref_name }}" "$OUT" --clobber --repo "$GITHUB_REPOSITORY"

      # ── Extras de Windows: MSI sin sufijo _en-US + .exe portable ──
      - name: Rename MSI and publish portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $base = "src-tauri/target/${{ matrix.target }}/release"
          $repo = "${{ github.repository }}"
          $tag  = "${{ github.ref_name }}"

          # --- MSI: quitar el sufijo _en-US del nombre ---------------
          #
          # Se renombra el asset **in situ** (PATCH del campo `name` por la API),
          # NO borrando y resubiendo. Es la única forma correcta: `latest.json`
          # referencia cada artefacto por **id numérico de asset**
          # (`…/releases/assets/475963396`), no por nombre. Un delete+upload crea un
          # asset **nuevo con otro id**, y el manifiesto —generado por tauri-action
          # antes de este paso— se queda apuntando al id borrado: 404 para el
          # updater de Windows. Un PATCH conserva el id, así que el manifiesto sigue
          # siendo válido y no hay nada que reescribir.
          $releaseId = gh api "repos/$repo/releases" --paginate --jq "map(select(.tag_name==`"$tag`"))[0].id"
          if (-not $releaseId) { throw "No se encontró el release del tag $tag" }

          $assets = gh api "repos/$repo/releases/$releaseId/assets" --paginate | ConvertFrom-Json
          foreach ($a in $assets) {
            if ($a.name -match '_en-US\.msi(\.sig)?$') {
              $newName = $a.name -replace '_en-US\.msi', '.msi'
              Write-Host "Renombrando asset $($a.id): $($a.name) -> $newName"
              gh api -X PATCH "repos/$repo/releases/assets/$($a.id)" -f name="$newName" | Out-Null
            }
          }

          # --- Portable: sube el rustty.exe sin instalar ------------
          $version  = $tag.TrimStart('v')
          $portable = "Rustty_${version}_x64-portable.exe"
          Copy-Item "$base/rustty.exe" "$base/$portable"
          gh release upload $tag "$base/$portable" --clobber

  publish_release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: Publish release

    steps:
      # Red de seguridad del updater: todo artefacto que `latest.json` anuncia debe
      # existir de verdad en el release. Si no, el updater se comería un 404 y el
      # usuario no se enteraría — así que preferimos **romper la publicación** aquí.
      #
      # El manifiesto referencia cada artefacto por **id numérico de asset**
      # (`https://api.github.com/repos/…/releases/assets/475963396`), NO por nombre:
      # por eso se comprueban ids contra los ids reales del release. Cualquier paso
      # que borre y resuba un asset (en vez de renombrarlo con un PATCH, que conserva
      # el id) dejaría el manifiesto apuntando al id viejo — que es exactamente el
      # fallo que este paso cazó al estrenarse, con el rename del MSI de Windows.
      - name: Verificar el manifiesto del updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release download "${GITHUB_REF_NAME}" \
                 --pattern latest.json --dir . --clobber \
                 --repo "${GITHUB_REPOSITORY}" 2>/dev/null; then
            echo "::warning::El release no tiene latest.json; se omite la verificación."
            exit 0
          fi
          jq -e . latest.json > /dev/null   # debe ser JSON válido

          RELEASE_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq "map(select(.tag_name==\"${GITHUB_REF_NAME}\"))[0].id")
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --paginate \
            --jq '.[] | "\(.id) \(.name)"' > assets.txt
          cut -d' ' -f1 assets.txt | sort > asset_ids.txt

          missing=0
          while read -r plat id; do
            [ -z "$id" ] && continue
            if grep -qxF "$id" asset_ids.txt; then
              echo "  ✓ ${plat} → $(grep "^${id} " assets.txt | cut -d' ' -f2-)"
            else
              echo "::error::latest.json anuncia para «${plat}» el asset ${id}, que no existe en el release."
              missing=1
            fi
          done < <(jq -r '.platforms | to_entries[] | "\(.key) \(.value.url | split("/") | last)"' latest.json)
          [ "$missing" -eq 0 ]

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --draft=false \
            --repo "${GITHUB_REPOSITORY}"

  # ── Publicar en winget (microsoft/winget-pkgs) ────────────────
  # Va aquí como job dependiente y no en un workflow aparte disparado por
  # `release:`, porque `publish_release` publica el release con el GITHUB_TOKEN
  # y los eventos generados por ese token no disparan otros workflows. Al
  # depender de `publish_release` garantizamos además que el MSI ya está subido.
  # Requiere el secreto WINGET_TOKEN (PAT classic con scope public_repo); si
  # falta, el job se omite con un aviso en lugar de fallar.
  winget:
    needs: publish_release
    runs-on: ubuntu-latest
    name: Publish to winget
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Comprobar token y calcular versión
        id: prep
        run: |
          if [ -z "$WINGET_TOKEN" ]; then
            echo "::warning::Falta el secreto WINGET_TOKEN; se omite la publicación en winget."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
          # winget usa la versión sin la «v» inicial del tag (v1.32.0 -> 1.32.0)
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Submit Rustty to winget-pkgs
        if: steps.prep.outputs.skip != 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier:       rustty.Rustty
          version:          ${{ steps.prep.outputs.version }}
          release-tag:      ${{ github.ref_name }}
          installers-regex: '_x64\.msi$'
          token:            ${{ env.WINGET_TOKEN }}
