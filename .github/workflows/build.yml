name: Build Rustty

on:
  push:
    tags:
      - "v*"          # Lanzar al hacer: git tag v0.1.0 && git push --tags
  workflow_dispatch:  # También se puede lanzar manualmente desde GitHub

permissions:
  contents: write     # Necesario para que tauri-action pueda crear el release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target:   x86_64-unknown-linux-gnu
            label:    Linux
          - platform: windows-latest
            target:   x86_64-pc-windows-msvc
            label:    Windows
          - platform: macos-latest
            target:   aarch64-apple-darwin
            label:    macOS (Apple Silicon)

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.label }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Rust ──────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Dependencias del sistema (solo Linux) ─────────────────
      # `rpm` para el bundle .rpm; `zstd` para el bundle .pkg.tar.zst (Arch).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            libssh2-1-dev \
            rpm \
            zstd

      # ── Dependencias del sistema (solo macOS) ─────────────────
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install libssh2 openssl pkg-config

      # ── Dependencias JS ───────────────────────────────────────
      - name: Install JS dependencies
        run: npm ci

      # ── Build Tauri ───────────────────────────────────────────
      # Los secretos de firma macOS (APPLE_*) se pasan siempre: si no están
      # definidos en el repo, las env vars quedan vacías y tauri-action
      # compila sin firmar, igual que antes. Solo tienen efecto en macOS.
      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "Rustty ${{ github.ref_name }}"
          releaseBody:   "Ver CHANGELOG para detalles."
          releaseDraft:  true
          prerelease:    false
          args:          --target ${{ matrix.target }}

      # ── Extras de Linux: empaquetar .pkg.tar.zst para Arch ────
      # Tauri no tiene target pacman; reusamos el .deb (mismo árbol)
      # extrayéndolo y empaquetándolo de nuevo como paquete Arch.
      - name: Build Arch Linux package (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Ruta absoluta — luego hacemos `cd $WORK/root` y la relativa dejaría
          # de resolver al escribir el .pkg.tar.zst.
          BUNDLE_DIR="$(realpath src-tauri/target/${{ matrix.target }}/release/bundle)"
          DEB=$(ls "$BUNDLE_DIR/deb"/*.deb | head -n1)
          WORK=$(mktemp -d)

          # Desempaqueta el .deb (rootfs) en $WORK/root
          mkdir -p "$WORK/root"
          dpkg-deb -x "$DEB" "$WORK/root"
          cd "$WORK/root"

          INSTALLED_SIZE=$(du -sb . | cut -f1)
          BUILDDATE=$(date +%s)

          # Metadatos del paquete pacman
          cat > .PKGINFO <<EOF
          pkgname = rustty
          pkgver = ${VERSION}-1
          pkgdesc = Cliente SSH/SFTP/RDP multiplataforma escrito en Rust
          url = https://rustty.es
          builddate = ${BUILDDATE}
          packager = Alejandro Soriano <noreply@rustty.es>
          size = ${INSTALLED_SIZE}
          arch = x86_64
          license = Apache
          depend = webkit2gtk-4.1
          depend = libayatana-appindicator
          EOF

          # Construye .pkg.tar.zst con bsdtar (que respeta el orden de pacman)
          OUT="$BUNDLE_DIR/Rustty-${VERSION}-1-x86_64.pkg.tar.zst"
          # Lista de ficheros a incluir (PKGINFO primero por convención)
          FILES=$(find . -type f -o -type l | sed 's|^\./||' | sort | sed '/^\.PKGINFO$/d')
          tar --zstd -cf "$OUT" .PKGINFO $FILES

          ls -la "$OUT"
          # `gh` necesita contexto de repo; tras empaquetar seguimos dentro
          # del rootfs temporal del .deb, que no contiene .git.
          cd "$GITHUB_WORKSPACE"
          gh release upload "${{ github.ref_name }}" "$OUT" --clobber --repo "$GITHUB_REPOSITORY"

      # ── Extras de Windows: MSI sin sufijo _en-US + .exe portable ──
      - name: Rename MSI and publish portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $base = "src-tauri/target/${{ matrix.target }}/release"

          # --- MSI: eliminar el sufijo _en-US del nombre -------------
          $msi = Get-ChildItem "$base/bundle/msi" -Filter "*_en-US.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            $newName = $msi.Name -replace '_en-US\.msi$', '.msi'
            Rename-Item -LiteralPath $msi.FullName -NewName $newName
            $sig = "$($msi.FullName).sig"
            if (Test-Path $sig) { Rename-Item -LiteralPath $sig -NewName "$newName.sig" }
            # Sustituye el asset en el release draft
            gh release delete-asset "${{ github.ref_name }}" $msi.Name --yes 2>$null
            gh release upload "${{ github.ref_name }}" "$base/bundle/msi/$newName" --clobber
          }

          # --- Portable: sube el rustty.exe sin instalar ------------
          $version  = "${{ github.ref_name }}".TrimStart('v')
          $portable = "Rustty_${version}_x64-portable.exe"
          Copy-Item "$base/rustty.exe" "$base/$portable"
          gh release upload "${{ github.ref_name }}" "$base/$portable" --clobber
