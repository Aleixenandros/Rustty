name: CI

# CI separado del release (build.yml). build.yml solo se dispara con tags v*
# y publica el release; aquí validamos PRs y pushes a main para no fusionar
# cambios (p. ej. de Dependabot) sin pasar por compilación, tests y lint.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancela runs anteriores del mismo ref para no acumular ejecuciones cuando
# un PR recibe varios pushes seguidos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job principal: build JS + check/test Rust en Linux ────────────
  lint-test:
    runs-on: ubuntu-latest
    name: Lint & test · Linux
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      # El toolchain lo dicta `src-tauri/rust-toolchain.toml` (fuente única). Con
      # `@stable` —flotante— el runner podía traer un Rust más nuevo que el local
      # y romper el build sin haber tocado código: pasó al etiquetar v1.54.0.
      - name: Leer el toolchain fijado
        id: rust
        shell: bash
        run: sed -n 's/^channel = "\(.*\)"/channel=\1/p' src-tauri/rust-toolchain.toml >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Misma lista de paquetes apt que build.yml para compilar Tauri en
      # Ubuntu, SIN libssh2-1-dev (el backend usa russh puro). `rpm`/`zstd`
      # no hacen falta aquí porque no empaquetamos, pero los demás sí para
      # que `cargo check` enlace contra webkit/gtk/soup/openssl.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: Install JS dependencies
        run: npm ci

      # Informativo: no bloquea el PR por avisos transitivos de prod.
      - name: npm audit (advisory)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      # `package.json` es la fuente única de la versión. Este check falla si no
      # está propagada a Cargo, los locks o la matriz de soporte de SECURITY.md
      # (que llegó a prometer parches para una línea ya abandonada).
      - name: Coherencia de versión
        run: npm run check:version

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      # Suites vitest de los módulos puros (subst, markdown, shell-quote,
      # command-suggest): protegen los espejos de contrato frontend⇄backend.
      - name: Test (vitest)
        run: npm test

      # Bloquea regresiones de contraste: los 12 temas base y la biblioteca
      # precargada deben mantenerse en AA (sale con código ≠0 si algo baja).
      - name: Contraste WCAG de temas (estricto)
        run: npm run check:contrast:ci

      # Bloquea regresiones de i18n: texto visible hardcodeado fuera de t(). La
      # paridad de claves no lo ve (esa cadena nunca llega al catálogo). Falla
      # solo con hallazgos NUEVOS: la deuda conocida vive en el baseline y solo
      # puede encoger.
      - name: i18n sin texto hardcodeado (estricto)
        run: npm run check:i18n:ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked

  # ── Clippy ────────────────────────────────────────────────────────
  #   1. Baseline `-D warnings`: **BLOQUEANTE** desde v1.54.0. Los avisos
  #      preexistentes que obligaban al `continue-on-error` están limpios (los
  #      `too_many_arguments` se resolvieron con structs de parámetros:
  #      `TransferCtx`, `SessionSpec`, `RdpTarget`). No introducir avisos nuevos.
  #   2. `-W clippy::pedantic`: aviso permanente (nunca bloqueante) para destapar
  #      mejoras de estilo de cara al troceo de los god-files de backend.
  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    steps:
      - uses: actions/checkout@v7

      # Igual que en el job anterior: la versión de Rust sale del fichero, nunca
      # del canal flotante. Aquí importa el doble, porque clippy es bloqueante y
      # sus lints nuevos llegan con cada versión.
      - name: Leer el toolchain fijado
        id: rust
        shell: bash
        run: sed -n 's/^channel = "\(.*\)"/channel=\1/p' src-tauri/rust-toolchain.toml >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: cargo clippy (baseline, bloqueante)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo clippy (pedantic, advisory)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -W clippy::pedantic
        continue-on-error: true

  # ── Regresión de plataforma: solo build JS + cargo check ──────────
  # Más ligeros que el job Linux; detectan roturas específicas de SO antes
  # de publicar con build.yml.
  platform-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: macos-latest
            label: macOS
    runs-on: ${{ matrix.platform }}
    name: Platform check · ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Leer el toolchain fijado
        id: rust
        shell: bash
        run: sed -n 's/^channel = "\(.*\)"/channel=\1/p' src-tauri/rust-toolchain.toml >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust.outputs.channel }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # build.yml en macOS instala openssl@3 y pkgconf vía brew; replicamos
      # lo mínimo. Windows no requiere dependencias de sistema extra.
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          missing=()
          for formula in openssl@3 pkgconf; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing+=("$formula")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          else
            echo "macOS dependencies already installed."
          fi

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked
